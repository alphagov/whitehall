name: Image cropper
description: Displays an image with resizable crop function
body: |
 This component uses Cropper.js - a JavaScript library for cropping image.
 Users can select an specific area of an image the image will then be cropped on browser-side and appended to the parent form on submission.
accessibility_criteria: |
  The component must:

  - be usable with a keyboard
examples:
  default:
    data:
      name: inputname,
      src: https://assets.publishing.service.gov.uk/media/68b08e903ef8543881a4f1af/s960_larry-the-cat.jpg,
      filename: example.jpg,
      type: image/jpeg
