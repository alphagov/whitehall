  admin:
    feedback:
      show_banner: false
    whats_new:
      show_banner: false
      title: What’s new in Whitehall Publisher
      summary: |
        Summary of updates from the GOV.UK publishing team on Whitehall Publisher, the roadmap, and getting involved
      last_updated: Last updated 31 March 2026
      introduction:
        heading: Roadmap overview
        body_govspeak: |
          Now:

          - We continue to work on the support and feature request backlog. 
          - We are working on some of Whitehall's underlying technical design to make future development of content types easier.
          - We are releasing a new way of making topical events and looking at how that may be used for other related content types.

          Next:

          - We will be considering options for improving how access and permissions work in Whitehall.

      upcoming_changes:
        heading: 
        updates:
      recent_changes:
        heading: Recent changes
        updates:
          - heading: Lead images optional on news articles
            area: Managing documents and editions
            type: improvement
            date: 31 March 2026
            body_govspeak: |
              As mentioned below, Lead images can now be removed from news articles when they aren't required. 

          - heading: Changes to lead images on news articles
            area: Managing documents and editions
            type: improvement
            date: 2 March 2026
            body_govspeak: |
              The workflow for the lead image on news articles is changing.

              You will see a "card" for the Lead image at the top of the images tab. As previously, the image defaults to the publisher's organisation lead image, or a placeholder if no lead image is associated with the organisation.

               - You can change the image to a custom image, if required, by clicking on the "Add" button.
               - As before, you can crop images and add captions.
               - To change the custom lead image, you can delete the existing image and upload a new one. 
              
              In a future iteration we will be offering the option to remove the lead image when it isn't required.

              [See the basecamp post for details](https://3.basecamp.com/4322319/buckets/15005645/messages/9633083274).
          - heading: Search resets after 30 minutes
            area: Managing documents
            type: improvement
            date: 2 March 2026
            body_govspeak: |
              If you search for documents on Whitehall using filters, these will now clear after a period of 30 minutes of inactivity.

              Previously, document search filters (e.g. title, state, author) persisted indefinitely.

              User feedback and analytics data suggested that retained filters are generally helpful within the same session, but persisting search filters after longer gaps was unhelpful and frustrating for publishers.

              This change should speed up the process of finding documents when returning to Whitehall after a break, and reduce the risk of confusion and mistakes caused by filters being applied unexpectedly.

              [See the basecamp post for details](https://3.basecamp.com/4322319/buckets/15005645/messages/9633749279).

          - heading: Number formatting in HTML publications
            area: Publishing HTML attachments
            type: bug fix
            date: 2 March 2026
            body_govspeak: |
              Until now, any number at the start of a heading on an HTML attachment was appearing as if it was a "numbered heading" on the contents list.

              This was a bug in the system that limited people writing headings if they wanted them to appear correctly in the contents list. 
              
              This has now been fixed.

              However, from now on HTML publications with manually numbered headings will only appear as numbered items on the contents list if they are correctly formatted with a full stop after the number.
              
              If your HTML attachment uses numbered chapter headings without full stops, you'll need to add a full stop after the number:

              ```
                 ## 1 Introduction becomes ## 1. Introduction
              ```
              
              [See the basecamp post for details](https://3.basecamp.com/4322319/buckets/15005645/messages/9633519850).

          - heading: Some changes to news articles
            area: Managing documents and editions
            type: improvement
            date: 21 November 2025
            body_govspeak: |
              As mentioned in the roadmap overview, we are working on the underlying technical design of Whitehall to make future development easier. As part of this work, we have made some changes to how news articles work in Whitehall.

              While the changes behind the scenes are a significant step forward, publishers should notice only a few small differences when creating and managing news articles:

               - The news article type is selected before drafting content.
               - The primary language is set in the Settings section of the document.
               - The lead image is selected using a dropdown.

              [See the basecamp post for details](https://3.basecamp.com/4322319/buckets/15005645/messages/9271188619).

              
          - heading: Drag and drop (bulk) image uploads in Whitehall
            area: Managing images
            type: improvement
            date: 03 November 2025
            body_govspeak: |
               On the document Image tab you can now upload single or multiple files by either choosing them or dragging them to the page.
               
               Once the images are uploaded you will see them listed. You can then crop them (if needed), add the caption, copy the Markdown and select the Lead image as before.
               
               [See the basecamp post for details](https://3.basecamp.com/4322319/buckets/15005645/messages/9231783110). 
               
               This should speed up the process of adding images to documents in Whitehall, especially when adding multiple images.
          - heading: Unpublishing reason shows on summary pages
            area: Managing documents and editions
            type: improvement
            date: 04 September 2025
            body_govspeak: |
               Previously, the reason for unpublishing was not made clear on the summary page of an edition. Now, if an edition has been unpublished, the reason for unpublishing will be shown in the status section on the summary page.

               Examples:

               - Unpublished (3 months ago) due to being published in error
               - Unpublished (5 months ago) due to being consolidated into another page
               
               This helps publishers and reviewers understand why an edition was unpublished.
          - heading: Consolidation of single and bulk attachments uploading 
            area: Adding attachments
            type: improvement
            date: 04 September 2025
            body_govspeak: |
               In a tweak to the user interface, the single and bulk upload options have been consolidated into one "Add attachment" component. This simplifies the process of adding attachments to a document.
          - heading: Bulk uploading attachments without .zip files
            area: Adding attachments
            type: improvement
            date: 25 July 2025
            body_govspeak: |
               Previously, publishers were required to put files in a .zip before bulk uploading. This is no longer the case. Publishers can upload (or drag and drop) files directly onto the page.
               
               [See the basecamp post for details](https://3.basecamp.com/4322319/buckets/15005645/messages/8893161083).
          - heading: Whitehall search for "Only invalid editions"
            area: Searching for documents
            type: improvement
            date: 17 July 2025
            body_govspeak: |
               Searches can now show all of the editions that have issues that would need addressing if you were to try to publish a new edition of that document. This helps departments see where there are issues and take remedial action. 
               
               [See the basecamp post for details](https://3.basecamp.com/4322319/buckets/15005645/messages/8869164879).
          - heading: Seeing validation issues on summary pages
            area: Creating and updating documents
            type: improvement
            date: 17 July 2025
            body_govspeak: |
              We are now surfacing all validation issues in the sidebar of each edition on the summary page. This makes it clear at a glance what issue needs fixing (without having to try to publish or schedule the edition first).
              
              [See the basecamp post for details](https://3.basecamp.com/4322319/buckets/15005645/messages/8869164879).
          - heading: Adding topic taxonomy tags to scheduled content
            area: Creating and updating documents
            type: change
            date: 15 July 2025
            body_govspeak: |
              It is no longer possible to schedule content to be published without adding topic taxonomy tags. Publishers and reviewers will no longer be able to "Force schedule" content without adding a tag. 
              
              This helps ensure the email subscriptions and filtering through search work as expected.

              [See the basecamp post for details](https://3.basecamp.com/4322319/buckets/15005645/messages/8872624190)
          - heading: Dangerous links removed from Whitehall content
            area: Creating and updating documents
            type: security
            date: 08 April 2025
            body_govspeak: |
              A number of URLs on Whitehall pages were discovered to now go through to “inappropriate” content on third-party sites.

              Work was done to monitor this and automate the removal of the dangerous links. This may result in the force publishing of content. When this happens a message will show saying: “This edition has been superseded” and internal note saying “Dangerous links automatically removed” will be added.
          - heading: Removing unwanted assets
            area: Supporting and managing content
            type: maintenance
            date: January 2025
            body_govspeak: |
              Throughout 2024 we noticed an increasing number of support tickets alerting us to assets (mostly PDFs) that had remained live despite the publishers removing them in Whitehall. We investigated the issues and removed 146,000 superseded assets for the system. We also solved some of the underlying issues that had caused the problems to occur. 

              This reduced the number of support issues related to the issue from 3-5 per week to a handful per quarter.

      guidance:
        heading: Publishing guidance, updates and support
        body_govspeak: |
          For support using Whitehall Publisher, read the guidance about:

          - [how to publish content on GOV.UK](https://www.gov.uk/guidance/how-to-publish-on-gov-uk)
          - [planning, writing and managing content](https://www.gov.uk/guidance/content-design)
          - [how to contact the Government Digital Service (GDS) to request or report something](https://www.gov.uk/guidance/contact-the-government-digital-service)

          The [GOV.UK style guide](https://www.gov.uk/guidance/style-guide) covers style, spelling and grammar conventions for content published on GOV.UK.

          Read the [Inside GOV.UK blog](https://insidegovuk.blog.gov.uk/) for updates about GOV.UK.
